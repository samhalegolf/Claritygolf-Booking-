[build]
  base = "source"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/session"
  to = "/.netlify/functions/auth-session"
  status = 200

[[redirects]]
  from = "/api/auth/forgot-password"
  to = "/.netlify/functions/auth-forgot-password"
  status = 200

[[redirects]]
  from = "/api/auth/reset-password"
  to = "/.netlify/functions/auth-reset-password"
  status = 200

[[redirects]]
  from = "/api/auth/change-password"
  to = "/.netlify/functions/auth-change-password"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200

[[redirects]]
  from = "/api/google-calendar-sync"
  to = "/.netlify/functions/google-calendar-sync"
  status = 200

[[redirects]]
  from = "/api/google-calendar/*"
  to = "/.netlify/functions/google-calendar/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "24"
