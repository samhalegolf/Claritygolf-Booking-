# Root Netlify config for the GitHub-ready handover package.
# The active app lives in source/.
[build]
  base = "source"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "24"
